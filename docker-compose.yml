services:
  user_db:
    image: postgres:15-alpine
    container_name: user_db
    environment:
      POSTGRES_DB: mediahub_user
      POSTGRES_USER: ${DB_USER:-user_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-user_pass}
    ports:
      - "${USER_DB_PORT}:5432"
    networks:
      - mediahub-network

  media_db:
    image: postgres:15-alpine
    container_name: media_db
    environment:
      POSTGRES_DB: mediahub_media
      POSTGRES_USER: ${DB_USER:-media_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-media_pass}
    ports:
      - "${MEDIA_DB_PORT}:5432"
    networks:
      - mediahub-network

  subscription_db:
    image: postgres:15-alpine
    container_name: subscription_db
    environment:
      POSTGRES_DB: mediahub_subscription
      POSTGRES_USER: ${DB_USER:-subscription_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-subscription_pass}
    ports:
      - "${SUB_DB_PORT}:5432"
    networks:
      - mediahub-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    environment:
      PGADMIN_DEFAULT_EMAIL: email@mediahub.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - mediahub-network

networks:
  mediahub-network:
    driver: bridge